services:
  mysql:
    image: mysql:8.0
    container_name: gastos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sistema_financeiro}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - gastos-net

  backend:
    build:
      context: ./backend
    container_name: gastos-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE:-sistema_financeiro};Uid=root;Pwd=${MYSQL_ROOT_PASSWORD:-root};"
    ports:
      - "${BACKEND_HOST_PORT:-5245}:8080"
    networks:
      - gastos-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5245/api}
    container_name: gastos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    networks:
      - gastos-net

networks:
  gastos-net:
    driver: bridge

volumes:
  mysql_data:
